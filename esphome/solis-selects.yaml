# Solis S6 EH3P — Selects (mode controls)
# Part of ESPHome modbus package — include via packages: in solis-lilygo.yaml

select:

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Force Charge Discharge
    address: 43135
    value_type: U_WORD
    entity_category: config
    icon: mdi:battery-sync
    skip_updates: 5
    optionsmap:
      "None": 0
      "Force Charge": 1
      "Force Discharge": 2

  # TOU Schedule Enable  (43310)
  # Write 35 (0x23) = RUN / enable, 33 (0x21) = STOP / disable.
  # Must be written with function code 0x06 after configuring time slots.

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Schedule
    address: 43310
    value_type: U_WORD
    entity_category: config
    icon: mdi:calendar-clock
    skip_updates: 5
    optionsmap:
      "Disabled": 33
      "Enabled": 35

  # Work Mode  (43110)

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Work Mode
    address: 43110
    value_type: U_WORD
    entity_category: config
    icon: mdi:battery-sync
    skip_updates: 5
    optionsmap:
      "Self-Use": 1
      "TOU": 2
      "Self-Use + Battery Wakeup": 9
      "Self-Use + Reserve-Battery": 17
      "Self-Use + Grid-Charge": 33
      "Self-Use + Reserve-Battery + Grid-Charge": 49
      "Self-Use + TOU + Reserve-Battery": 19
      "Self-Use + TOU + Grid-Charge": 35
      "Self-Use + TOU + Reserve-Battery + Grid-Charge": 51
      "Feed-in + Reserve-Battery": 80
      "Feed-in + Grid-Charge": 96
      "Feed-in + Reserve-Battery + Grid-Charge": 112
      "Feed-in + TOU + Reserve-Battery": 82
      "Feed-in + TOU + Grid-Charge": 98
      "Feed-in + TOU + Reserve-Battery + Grid-Charge": 114
      "Self-Use + TOU": 3
      "Off-Grid": 4
      "Feed-in Priority": 64
      "Feed-in + TOU": 66
      "Peak Shaving": 2048


# ===========================================================================
# TEXT SENSOR  —  diagnostic / info / version  (ONCE — skip_updates: 120)
# ===========================================================================
