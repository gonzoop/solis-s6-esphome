  # ==========================================================================
  # DERIVED SENSORS  (calculated in ESPHome from raw registers)
  # These replicate the HA integration's hybrid_sensors_derived list
  # ==========================================================================

  # PV Power per string (V × I)

  - platform: template
    name: PV Power 1
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      auto v = id(pv_voltage_1_raw).state;
      auto i = id(pv_current_1_raw).state;
      if (!isnan(v) && !isnan(i)) return v * i;
      return {};

  - platform: template
    name: PV Power 2
