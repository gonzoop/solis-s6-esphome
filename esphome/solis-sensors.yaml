  # Battery Charge Power (positive when charging, 0 when discharging)

  - platform: template
    name: Battery Charge Power
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float p = id(battery_power_raw).state;
      return (p > 0) ? p : 0.0f;

  # Battery Discharge Power (positive when discharging, 0 when charging)

  - platform: template
    name: Battery Discharge Power
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float p = id(battery_power_raw).state;
      return (p < 0) ? -p : 0.0f;

  # Grid Power Net — positive = importing, negative = exporting
  # Uses meter total active power (33263) which is signed by the meter

  - platform: template
    name: Grid Power Net
    device_class: power
    state_class: measurement
    unit_of_measurement: W
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float v = id(meter_total_active_power_raw).state;
      if (isnan(v)) return {};
      return -v;

  # Today net grid energy (imported - exported), approximate from daily counters

  - platform: template
    name: Today Net Grid Energy
    device_class: energy
    state_class: total_increasing
    unit_of_measurement: kWh
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      float imp = id(today_energy_imported_from_grid_raw).state;
      float exp = id(today_energy_fed_into_grid_raw).state;
      if (!isnan(imp) && !isnan(exp)) return imp - exp;
      return {};



  # ===========================================================================
  # INVERTER RTC SYNC  —  reads clock registers and corrects if >42s off
  # ===========================================================================

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    id: inverter_clock
    name: "Inverter Clock (internal)"
    address: 33022
    register_count: 6
    register_type: read
    value_type: U_WORD
    skip_updates: 5
    internal: true
    entity_category: diagnostic
    lambda: |-
      time_t i_t;
      struct tm i_tm = { 0 };
      i_tm.tm_year  = ((data[item->offset+ 0] << 8) | (data[item->offset+ 1])) + 2000 - 1900;
      i_tm.tm_mon   = ((data[item->offset+ 2] << 8) | (data[item->offset+ 3])) - 1;
      i_tm.tm_mday  = (data[item->offset+ 4] << 8) | (data[item->offset+ 5]);
      i_tm.tm_hour  = (data[item->offset+ 6] << 8) | (data[item->offset+ 7]);
      i_tm.tm_min   = (data[item->offset+ 8] << 8) | (data[item->offset+ 9]);
      i_tm.tm_sec   = (data[item->offset+10] << 8) | (data[item->offset+11]);
      i_tm.tm_isdst = -1;
      i_t = mktime(&i_tm);
      ESP_LOGI("SyncInverterRTC", "Inverter RTC is %02d:%02d:%02d %04d-%02d-%02d",
        i_tm.tm_hour, i_tm.tm_min, i_tm.tm_sec,
        i_tm.tm_year + 1900, i_tm.tm_mon + 1, i_tm.tm_mday);
      auto s_espt = id(network_time).now();
      if (s_espt.is_valid()) {
        double deviation = difftime(i_t, s_espt.timestamp);
        if (abs(deviation) > 42) {
          std::vector<uint16_t> rtc_data = {
            (uint16_t)(s_espt.year % 100), s_espt.month, s_espt.day_of_month,
            s_espt.hour, s_espt.minute, s_espt.second
          };
          auto set_rtc_command =
            modbus_controller::ModbusCommandItem::create_write_multiple_command(
              modbus_master, 43000, item->register_count, rtc_data);
          modbus_master->queue_command(set_rtc_command);
          ESP_LOGI("SyncInverterRTC",
            "RTC deviation=%.fs, updated to %02d:%02d:%02d %04d-%02d-%02d",
            deviation, s_espt.hour, s_espt.minute, s_espt.second,
            s_espt.year, s_espt.month, s_espt.day_of_month);
        }
      } else {
        ESP_LOGI("SyncInverterRTC", "NTP not yet synchronised, skipping RTC check");
      }
      return {};
