esphome:
  name: solis-lilygo
  on_boot:
    priority: 600
    then:
      - output.turn_on: boost_power_en
      - output.turn_on: rs485_callback
      - output.turn_on: rs485_en

esp32:
  board: esp32dev
  framework:
    type: arduino
    version: recommended

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  reboot_timeout: 0s
  manual_ip:
    static_ip: 192.168.10.60
    gateway: 192.168.10.1
    subnet: 255.255.255.0
    dns1: 1.1.1.1

# MQTT replaces the native HA API.
# All sensor/binary_sensor/number/select states are published automatically.
# Numbers and selects also subscribe to their command topics so the inverter
# can be controlled from any MQTT client or from Home Assistant via discovery.
mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  # Home Assistant auto-discovery — remove or set to false if not using HA
  discovery: true
  discovery_prefix: homeassistant
  # Retain sensor state messages so HA picks up values on restart
  birth_message:
    topic: solis-lilygo/status
    payload: online
    retain: true
  will_message:
    topic: solis-lilygo/status
    payload: offline
    retain: true

ota:
  - platform: esphome

logger:
  level: DEBUG
  baud_rate: 115200
  logs:
    light: WARN
    esp32_rmt_led_strip: WARN
    modbus_controller: INFO

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "LilyGO Status LED"
    internal: true
    pin: GPIO4
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s

web_server:
  port: 80
  version: 2

packages:
  solis_binary_sensors: !include solis-binary-sensors.yaml
  solis_sensors:        !include solis-sensors.yaml
  solis_numbers:        !include solis-numbers.yaml
  solis_selects:        !include solis-selects.yaml
  solis_text_sensors:   !include solis-text-sensors.yaml

uart:
  id: modbus_uart
  tx_pin: GPIO22
  rx_pin: GPIO21
  baud_rate: 9600
  stop_bits: 1

modbus:
  send_wait_time: 1000ms
  id: modbus_hw
  uart_id: modbus_uart

modbus_controller:
  - id: modbus_master
    address: 0x1
    modbus_id: modbus_hw
    setup_priority: -10
    update_interval: 15s
    on_command_sent:
      then: []

output:
  - platform: gpio
    pin: 16
    id: boost_power_en
  - platform: gpio
    pin: 17
    id: rs485_callback
  - platform: gpio
    pin: 19
    id: rs485_en

script:
  - id: modbus_activity
    mode: restart
    then: []

time:
  - platform: sntp
    id: network_time
