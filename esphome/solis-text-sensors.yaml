# Solis S6 EH3P — Text Sensors (diagnostic & status strings)
# Part of ESPHome modbus package — include via packages: in solis-lilygo.yaml

text_sensor:

  - platform: template
    name: Inverter Status
    icon: mdi:information
    entity_category: diagnostic
    update_interval: 15s
    lambda: |-
      uint16_t v = (uint16_t) id(inverter_status_raw).state;
      switch (v) {
        case    0: return {"Normal operation"};
        case    1: return {"Open loop operation"};
        case    2: return {"Waiting"};
        case    3: return {"Generating"};
        case    4: return {"Bypass / Inverting / Running"};
        case    5: return {"Bypass / Inverting / Synchronize"};
        case    6: return {"Bypass / Grid / Running"};
        case 4100: return {"Control off-Grid"};
        case 4110: return {"Grid overvoltage"};
        case 4111: return {"Grid undervoltage"};
        case 4112: return {"Grid overfrequency"};
        case 4113: return {"Grid underfrequency"};
        case 4114: return {"Grid impedance too large"};
        case 4115: return {"No Grid"};
        case 4116: return {"Grid imbalance"};
        case 4117: return {"Grid frequency jitter"};
        case 4118: return {"Grid overcurrent"};
        case 4119: return {"Grid current tracking fault"};
        case 4120: return {"DC overvoltage"};
        case 4121: return {"DC bus overvoltage"};
        case 4122: return {"DC busbar uneven voltage"};
        case 4123: return {"DC bus undervoltage"};
        case 4124: return {"DC busbar uneven voltage 2"};
        case 4125: return {"DC A overcurrent"};
        case 4126: return {"DC B overcurrent"};
        case 4127: return {"DC input disturbance"};
        case 4130: return {"Grid disturbance"};
        case 4131: return {"DSP init fault"};
        case 4132: return {"Temperature protection"};
        case 4133: return {"Ground protection"};
        case 4134: return {"Leakage current fault"};
        case 4135: return {"Relay failure"};
        case 4136: return {"DSP_B failure"};
        case 4137: return {"DC component too large"};
        case 4138: return {"12V undervoltage fault"};
        case 4139: return {"Leakage current self-test fault"};
        case 4140: return {"Under temperature protection"};
        case 4141: return {"Arc self-test fault"};
        case 4142: return {"Arc malfunction"};
        case 4143: return {"DSP SRAM exception"};
        case 4144: return {"DSP FLASH exception"};
        case 4145: return {"DSP PC pointer abnormal"};
        case 4146: return {"DSP key register exception"};
        case 4147: return {"Grid disturbance 02"};
        case 4148: return {"Grid current sampling abnormal"};
        case 4149: return {"IGBT overcurrent"};
        case 4150: return {"Grid current transient"};
        case 4151: return {"Battery overvoltage hardware fault"};
        case 4152: return {"LLC hardware overcurrent"};
        case 4153: return {"Battery overvoltage"};
        case 4154: return {"Battery undervoltage"};
        case 4155: return {"Battery not connected"};
        case 4156: return {"Bypass overvoltage fault"};
        case 4157: return {"Bypass overload fault"};
        default: {
          char buf[16];
          snprintf(buf, sizeof(buf), "Unknown (%u)", v);
          return {buf};
        }
      }

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Product Model
    register_type: read
    address: 33000
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:factory
    skip_updates: 120

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: DSP Software Version
    register_type: read
    address: 33001
    response_size: 2
    force_new_range: true
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:chip
    skip_updates: 120

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: HMI Software Version
    register_type: read
    address: 33002
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:chip
    skip_updates: 120

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Protocol Version
    register_type: read
    address: 33003
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:chip
    skip_updates: 120

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Inverter SN
    register_type: read
    address: 33004
    register_count: 4
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:numeric
    skip_updates: 120
    lambda: |-
      char serialnumber[4 * 4 + 1];
      for (int j = 0; j < 4; j++) {
        unsigned int r = esphome::modbus_controller::word_from_hex_str(x, j * 2);
        sprintf(serialnumber + (j * 4), "%02x%02x",
          (r & 0x0F) << 4 | (r & 0xF0) >> 4,
          (r & 0x0F00) >> 4 | (r & 0xF000) >> 12);
      }
      serialnumber[4 * 4] = 0;
      return std::string(serialnumber);

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Country Standard Code
    register_type: read
    address: 33092
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:earth
    skip_updates: 120
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0x003: return std::string("VDE0126");
        case 0x009: return std::string("MEX-CFE");
        case 0x00B: return std::string("VDE4105");
      }
      return x;

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Inverter Type Definition
    register_type: read
    address: 35000
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:chip
    skip_updates: 120

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Work Mode String
    register_type: holding
    address: 43110
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:battery-sync
    skip_updates: 5
    lambda: |-
      uint16_t v = modbus_controller::word_from_hex_str(x, 0);
      std::string modes = "";
      if (v & (1 << 0))  modes += "Self-Use ";
      if (v & (1 << 1))  modes += "TOU ";
      if (v & (1 << 2))  modes += "Off-Grid ";
      if (v & (1 << 3))  modes += "Battery-Wakeup ";
      if (v & (1 << 4))  modes += "Reserve-Battery ";
      if (v & (1 << 5))  modes += "Grid-Charge ";
      if (v & (1 << 6))  modes += "Feed-In-Priority ";
      if (v & (1 << 11)) modes += "Peak-Shaving ";
      if (modes.empty()) modes = "Unknown";
      return modes;

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Force Charge Discharge State
    register_type: holding
    address: 43135
    response_size: 2
    raw_encode: HEXBYTES
    entity_category: diagnostic
    icon: mdi:battery-sync
    skip_updates: 5
    lambda: |-
      uint16_t v = modbus_controller::word_from_hex_str(x, 0);
      switch (v) {
        case 0: return std::string("None");
        case 1: return std::string("Force Charge");
        case 2: return std::string("Force Discharge");
      }
      return std::string("Unknown");
