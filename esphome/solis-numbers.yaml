# Solis S6 EH3P — Numbers (writable settings)
# Part of ESPHome modbus package — include via packages: in solis-lilygo.yaml

number:

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Max Charge SOC
    register_type: holding
    address: 43010
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-high
    skip_updates: 5
    mode: box
    min_value: 70
    max_value: 100

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Overdischarge SOC
    register_type: holding
    address: 43011
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-low
    skip_updates: 5
    mode: box
    min_value: 5
    max_value: 40

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Max Charge Current
    register_type: holding
    address: 43012
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-dc
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 200
    multiply: 0.1
    step: 0.1

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Max Discharge Current
    register_type: holding
    address: 43013
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-dc
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 200
    multiply: 0.1
    step: 0.1

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Force Charge SOC
    register_type: holding
    address: 43018
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-charging
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 100

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Battery Rated Capacity
    register_type: holding
    address: 43019
    value_type: U_WORD
    unit_of_measurement: 'Ah'
    entity_category: config
    icon: mdi:battery
    skip_updates: 5
    mode: box
    min_value: 50
    max_value: 9999

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Backup Reserve SOC
    register_type: holding
    address: 43024
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-lock
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 100

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Force Charge Power Limitation
    register_type: holding
    address: 43027
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-charging
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 6000
    multiply: 10
    step: 10

  # -- Output / grid limits  (SLOW — skip_updates: 5) -----------------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Limit Output Power
    register_type: holding
    address: 43052
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:percent
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 110
    multiply: 100
    step: 100

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Backflow Power Limit
    register_type: holding
    address: 43074
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:transmission-tower-import
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 20000
    multiply: 100
    step: 100

  # -- Remote control  (SLOW — skip_updates: 5) ------------------------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Force Discharge Power
    register_type: holding
    address: 43129
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-arrow-down
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 20000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Battery Charge Limit Power
    register_type: holding
    address: 43130
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-charging
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 6000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Battery Discharge Limit Power
    register_type: holding
    address: 43131
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-charging
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 6000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Force Charge Power
    register_type: holding
    address: 43136
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-arrow-up
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 20000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Off-Grid Overdischarge SOC
    register_type: holding
    address: 43137
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-off
    skip_updates: 5
    mode: box
    min_value: 10
    max_value: 100

  # -- Time-charging current  (SLOW — skip_updates: 5) ----------------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Time-Charging Charge Current
    register_type: holding
    address: 43141
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-ac
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 135
    multiply: 0.1
    step: 0.1

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Time-Charging Discharge Current
    register_type: holding
    address: 43142
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-ac
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 135
    multiply: 0.1
    step: 0.1

  # -- RC Timeout  (SLOW — skip_updates: 5) ----------------------------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Timeout
    register_type: holding
    address: 43282
    value_type: U_WORD
    unit_of_measurement: 'min'
    entity_category: config
    icon: mdi:timer
    skip_updates: 5
    mode: box
    min_value: 1
    max_value: 30

  # -- Battery max charge/discharge current readback  (SLOW) -----------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Battery Max Charge Current
    register_type: holding
    address: 43117
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-dc
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 200
    multiply: 0.1
    step: 0.1

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Battery Max Discharge Current
    register_type: holding
    address: 43118
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-dc
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 200
    multiply: 0.1
    step: 0.1

  # -- TOU v2 slot settings  (SLOW — skip_updates: 5) -----------------------

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Charge Cut-off SOC (Slot 1)
    register_type: holding
    address: 43708
    value_type: U_WORD
    unit_of_measurement: '%'
    entity_category: config
    icon: mdi:battery-clock
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 100

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Charge Battery Current (Slot 1)
    register_type: holding
    address: 43709
    value_type: U_WORD
    unit_of_measurement: 'A'
    entity_category: config
    icon: mdi:current-dc
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 300
    multiply: 0.01
    step: 0.01


# ===========================================================================
# SELECT  —  multi-option control registers
# ===========================================================================
