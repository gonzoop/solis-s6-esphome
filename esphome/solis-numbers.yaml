    icon: mdi:battery-charging
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 6000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: RC Force Charge Power
    register_type: holding
    address: 43136
    value_type: U_WORD
    unit_of_measurement: 'W'
    entity_category: config
    icon: mdi:battery-arrow-up
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 20000
    multiply: 10
    step: 10

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: Off-Grid Overdischarge SOC
    register_type: holding
    address: 43137
