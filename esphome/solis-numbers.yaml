    max_value: 200
    multiply: 0.1
    step: 0.1

  # -- TOU time slot schedule  (43143–43170)  (SLOW — skip_updates: 5) ------
  # Each slot defines a charge window and a discharge window via start/end
  # hour and minute registers.  Enable/disable the whole schedule via
  # register 43310 (see solis-selects.yaml).

  # Slot 1 — Charge window
  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Slot 1 Charge Start Hour
    register_type: holding
    address: 43143
    value_type: U_WORD
    unit_of_measurement: 'h'
    entity_category: config
    icon: mdi:clock-start
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 23

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Slot 1 Charge Start Minute
    register_type: holding
    address: 43144
    value_type: U_WORD
    unit_of_measurement: 'min'
    entity_category: config
    icon: mdi:clock-start
    skip_updates: 5
    mode: box
    min_value: 0
    max_value: 59

  - platform: modbus_controller
    modbus_controller_id: modbus_master
    name: TOU Slot 1 Charge End Hour
    register_type: holding
    address: 43145
    value_type: U_WORD
    unit_of_measurement: 'h'
    entity_category: config
    icon: mdi:clock-end
    skip_updates: 5
